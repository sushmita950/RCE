<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Scanner</title>
</head>
<body>
    <h1>Port Scanner</h1>
    <input type="text" id="target" placeholder="Enter target IP or hostname">
    <button onclick="scanPorts()">Scan</button>

    <h2>Open Ports:</h2>
    <ul id="open-ports"></ul>

    <script>
        async function scanPorts() {
            const target = document.getElementById('target').value;
            const openPorts = [];
            const webhookUrl = 'https://webhook.site/your_unique_webhook_url'; // Replace with your webhook URL

            for (let port = 1; port <= 65535; port++) {
                const isOpen = await checkPort(target, port);
                if (isOpen) {
                    openPorts.push(port);
                    sendToWebhook(target, port);
                }
            }

            displayOpenPorts(openPorts);
        }

        function displayOpenPorts(ports) {
            const ul = document.getElementById('open-ports');
            ul.innerHTML = '';
            ports.forEach(port => {
                const li = document.createElement('li');
                li.textContent = `Port ${port} is open.`;
                ul.appendChild(li);
            });
        }

        function sendToWebhook(target, port) {
            fetch(webhookUrl, {
                method: 'POST',
                body: JSON.stringify({ target: target, port: port }),
                headers: {
                    'Content-Type': 'application/json'
                }
            });
        }

        function checkPort(target, port) {
            return new Promise(resolve => {
                const socket = new WebSocket(`ws://${target}:${port}`);
                socket.onopen = () => {
                    socket.close();
                    resolve(true);
                };
                socket.onerror = () => {
                    resolve(false);
                };
                setTimeout(() => {
                    socket.close();
                    resolve(false);
                }, 1000);
            });
        }
    </script>
</body>
</html>
