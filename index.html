<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive SSRF Testing Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .badge {
            display: inline-block;
            padding: 10px;
            border-radius: 5px;
            margin: 5px;
            color: white;
        }
        .success { background-color: #28a745; }
        .fail { background-color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Comprehensive SSRF Testing Tool</h1>
        <p>This tool allows for extensive SSRF testing with webhook integration.</p>

        <button id="testButton">Send Test Payload</button>
        <div id="results"></div>
        <div id="badges"></div>
    </div>

    <script>
        const webhookUrl = 'https://webhook.site/4eb0eaf7-b3a6-47d2-85c8-c47759291f94';
        const payloads = [
            { data: 'Azure Payload 1' },
            { data: 'Azure Payload 2' },
            { data: 'Azure Payload 3' }
        ];

        document.getElementById('testButton').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            const badgesDiv = document.getElementById('badges');
            resultsDiv.innerHTML = '';  
            badgesDiv.innerHTML = '';

            for (const payload of payloads) {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const status = response.ok ? 'success' : 'fail';
                resultsDiv.innerHTML += `<p>Test ${status} for ${JSON.stringify(payload)}</p>`;
                badgesDiv.innerHTML += `<span class='badge ${status}'>${status.toUpperCase()}</span>`;
            }
        });
    </script>
</body>
</html>
